<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in · Tracker</title>
  <link rel="icon" href="favicon.ico">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/app.css">
</head>
<body class="login-page">
  <aside class="login-art">
    <div class="brand">
      <span class="mark">T</span>
      <span>Tracker<span class="slash">/</span><span class="sub">archive</span></span>
    </div>
    <div>
      <h1 class="wordmark">Every commission, <em>on record.</em></h1>
      <p class="pitch">A private desk for what the group discussed on WhatsApp · stages, briefs, decisions, deliverables · one shared login, live sync.</p>
    </div>
    <p class="kicker">v.001 · private edition</p>
  </aside>

  <main class="login-wrap">
    <div class="login-card">
      <p class="kicker">Admission</p>
      <h2 class="login-title">Sign in.</h2>
      <p class="login-sub">Use the shared credentials.</p>

      <form id="loginForm" class="login-form" autocomplete="off" novalidate>
        <label>
          Email
          <input id="email" type="email" required autocomplete="username">
        </label>
        <label>
          Password
          <input id="password" type="password" required autocomplete="current-password">
        </label>
        <div id="error" class="login-error" role="alert" aria-live="polite"></div>
        <button type="submit" class="btn-primary">Enter</button>
      </form>
    </div>
  </main>

  <script type="module" src="js/login.js"></script>
</body>
</html>
