<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in · The Tracker</title>
  <link rel="icon" href="favicon.ico">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/app.css">
</head>
<body class="login-page">
  <header class="masthead">
    <div class="masthead-left">VOL. I · NO. 001</div>
    <h1 class="masthead-title">The Tracker <span class="amp">&amp;</span> Archive</h1>
    <div class="masthead-right" id="dateline"></div>
  </header>

  <div class="folio">
    <span>Est. 2026</span><span>Press run &amp; project ledger</span><span>Private edition</span>
  </div>

  <main class="login-wrap">
    <div class="login-card">
      <p class="login-kicker kicker">Admission</p>
      <h2 class="login-title">Sign in.</h2>
      <p class="login-sub">The shared desk only</p>

      <form id="loginForm" class="login-form" autocomplete="off" novalidate>
        <label>
          Electronic address
          <input id="email" type="email" required autocomplete="username">
        </label>
        <label>
          Passphrase
          <input id="password" type="password" required autocomplete="current-password">
        </label>
        <div id="error" class="login-error" role="alert" aria-live="polite"></div>
        <button type="submit" class="btn-primary">Enter the archive</button>
      </form>
    </div>
  </main>

  <script type="module" src="js/datestamp.js"></script>
  <script type="module" src="js/login.js"></script>
</body>
</html>
